<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>SmartHub | Signup</title>
</head>
<body class="login-body">

    <form class="signup-form">
        
        <label for="username" class="signup-label">Username:</label>
        <input id="username" class="signup-input" type="text" name="username" placeholder="Username">


        <label for="email" class="signup-label">Email:</label>
        <input id="email" class="signup-input" type="email" name="email" placeholder="email">

        
        <label for="phone" class="signup-label">Phone Number:</label>
        <input id="phone" class="signup-input" type="number" name="phone" placeholder="phone">

        <label for="password" class="signup-label">Password:</label>
        <input id="password" class="signup-input" type="password" name="password" placeholder="password">     
        
        <input class="signup-submit" type="submit" name="submit" value="Signup">
        
        <span>Or <a href="login.html">Login</a></span>

        <a href="index.html">⬅️Go back gome</a>
    </form>


</body>
</html>
